services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logistics-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - logistics-network

  nginx:
    image: nginx:alpine
    container_name: logistics-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - logistics-network

  mysql:
    image: mysql:8.0
    container_name: logistics-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-logistics_app}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - logistics-network

  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - logistics-network

  node:
    image: node:20-alpine
    container_name: logistics-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    entrypoint: ["npm", "run", "dev"]
    ports:
      - "5173:5173"
    networks:
      - logistics-network

networks:
  logistics-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
